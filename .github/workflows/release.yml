name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            goos: darwin
            goarch: arm64
          - platform: darwin-x64
            goos: darwin
            goarch: amd64
          - platform: linux-arm64
            goos: linux
            goarch: arm64
          - platform: linux-x64
            goos: linux
            goarch: amd64
          - platform: windows-x64
            goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: build cross-compiled binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/plugin
          cp -R plugin/. dist/plugin/
          mkdir -p dist/plugin/bin
          for cmd in pc-hook-session pc-hook-prompt pc-hook-tool pc-hook-stop pc-cli pc-mcp; do
            go build -trimpath -ldflags="-s -w" -o "dist/plugin/bin/${cmd}${{ matrix.ext }}" "./cmd/${cmd}"
          done

      - name: package tarball
        id: pack
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="promptcellar-${VERSION}-${{ matrix.platform }}.tar.gz"
          tar -czf "$NAME" -C dist/plugin .
          shasum -a 256 "$NAME" | tee "${NAME}.sha256"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            promptcellar-*.tar.gz
            promptcellar-*.tar.gz.sha256

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: list artefacts
        run: ls -la dist/
      - name: github release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/promptcellar-*.tar.gz
            dist/promptcellar-*.tar.gz.sha256
          generate_release_notes: true

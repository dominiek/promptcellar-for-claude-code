name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: build + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install python jsonschema
        run: pip install --quiet jsonschema

      - name: go vet
        run: go vet ./...

      - name: unit tests
        run: go test ./...

      - name: build binaries
        run: make build

      - name: M1 integration tests
        run: bash test/m1_integration.sh

      - name: M3 integration tests
        run: bash test/m3_integration.sh
